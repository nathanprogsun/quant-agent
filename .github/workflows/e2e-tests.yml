name: E2E Tests

on:
  push:
    branches: [main]
    paths: [frontend/**, .github/workflows/e2e-tests.yml]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths: [frontend/**, .github/workflows/e2e-tests.yml]

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e-tests:
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: corepack enable
      - run: corepack prepare pnpm@9 --activate
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: npx playwright install chromium --with-deps
        working-directory: frontend
      - id: has-tests
        run: |
          if [ -d "frontend/e2e" ] && [ "$(ls -A frontend/e2e/*.spec.* 2>/dev/null | wc -l)" -gt 0 ]; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/setup-python@v6
        if: steps.has-tests.outputs.has_tests == 'true'
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        if: steps.has-tests.outputs.has_tests == 'true'
      - run: uv sync --all-extras
        if: steps.has-tests.outputs.has_tests == 'true'
        working-directory: backend
      - name: Start backend for E2E
        if: steps.has-tests.outputs.has_tests == 'true'
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./e2e-data.db
          CHECKPOINTER_CONNECTION_STRING: e2e-checkpoints.db
          OPENAI_API_KEY: test-key-for-e2e
          JWT_SECRET_KEY: e2e-jwt-secret
          SESSION_SECRET_KEY: e2e-session-secret
        run: |
          uv run alembic upgrade head
          nohup uv run uvicorn app.web.application:app --host 127.0.0.1 --port 8000 > /tmp/e2e-backend.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "Backend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to start"
          cat /tmp/e2e-backend.log
          exit 1
      - name: Start frontend for E2E
        if: steps.has-tests.outputs.has_tests == 'true'
        working-directory: frontend
        env:
          BACKEND_URL: http://127.0.0.1:8000
          SKIP_ENV_VALIDATION: "1"
        run: |
          nohup pnpm dev --hostname 127.0.0.1 --port 3000 > /tmp/e2e-frontend.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000 > /dev/null; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 2
          done
          echo "Frontend failed to start"
          cat /tmp/e2e-frontend.log
          exit 1
      - run: pnpm exec playwright test
        if: steps.has-tests.outputs.has_tests == 'true'
        working-directory: frontend
        env:
          SKIP_ENV_VALIDATION: "1"
          CI: "true"
          BACKEND_URL: http://127.0.0.1:8000
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
