version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: development
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    environment:
      - ENVIRONMENT=local
      - DATABASE_URL=sqlite+aiosqlite:///./data.db
    env_file:
      - ../.env

  # Optional: PostgreSQL database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Optional: Redis cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
