[project]
name = "backend"
version = "0.1.0"
description = "FastAPI project generated by cookiecutter-fastapi"
readme = "README.md"
requires-python = ">=3.13"
license = {text = "MIT"}
authors = [
    {name = "backend contributors"},
]
dependencies = [
    "fastapi>=0.115.0",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "aiosqlite>=0.20",
    "pydantic[email]>=2.0",
    "pydantic-settings>=2.0",
    "uvicorn>=0.30",
    "httpx>=0.27",
    "orjson>=3.9",
    "python-jose[cryptography]>=3.3",
    "passlib[bcrypt]>=1.7",
    "bcrypt>=4.0.0,<5.0.0",
    "python-multipart>=0.0.9",
    "pytz>=2023.3",
    "opentelemetry-sdk>=1.20",
    "opentelemetry-api>=1.20",
    "email-validator>=2.0",
    "types-pytz>=2026.2.0.20260518",
    "types-passlib>=1.7.7.20260211",
    "types-python-jose>=3.5.0.20260408",
    "types-gunicorn>=26.0.0.20260518",
    "opentelemetry-instrumentation>=0.63b1",
    "opentelemetry-instrumentation-fastapi>=0.63b1",
    "opentelemetry-instrumentation-redis>=0.63b1",
    "opentelemetry-instrumentation-sqlalchemy>=0.63b1",
    "opentelemetry-exporter-otlp-proto-grpc>=1.20",
    "prometheus-fastapi-instrumentator>=7.1.0",
    "langgraph>=1.2.1",
    "langchain-core>=1.4.0",
    "langchain-openai>=1.2.2",
    "langgraph-checkpoint>=4.1.1",
    "langgraph-checkpoint-sqlite>=3.1.0",
    "debugpy>=1.8.20",
    "chromadb>=0.5.0",
    "sentence-transformers>=3.0.0",
    "llama-index-core>=0.14.22",
    "llama-index-retrievers-bm25>=0.7.1",
    "llama-index-embeddings-huggingface>=0.7.0",
    "llama-index-vector-stores-chroma>=0.5.5",
    "llama-index-llms-openai>=0.7.9",
    "langchain-mcp-adapters>=0.3.0",
    "langchain>=1.2.15",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"


[tool.ruff]
target-version = "py313"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"

[tool.setuptools.packages.find]
where = [".", "packages"]
include = ["app*", "jqcli*"]

[tool.mypy]
python_version = "3.13"
strict = true

# Third-party libs without type stubs (uvloop on some platforms, chromadb
# in some versions, gunicorn, etc.). Standard compromise for FastAPI
# codebases that integrate many ecosystem packages. Local code remains
# fully strict.
ignore_missing_imports = true

# Strengthen beyond default `strict`:
#   warn_unreachable:  flag dead code after return/raise
#   enable_error_code: additional correctness checks
# Note: `disallow_any_explicit = true` is intentionally NOT enabled here —
# the codebase has ~450 explicit `Any` usages that would all need to be
# replaced with TypedDicts / Pydantic models before that flag can be turned
# on without breaking the build. Tracked as a separate refactor.
warn_unreachable = true
enable_error_code = [
    "redundant-expr",
    "truthy-bool",
    "ignore-without-code",
    "possibly-undefined",
]

# Vendored third-party code under packages/jqcli/ — not under our control.
# Skip strict type checking for the entire vendored tree.
[[tool.mypy.overrides]]
module = "jqcli"
ignore_errors = true

[[tool.mypy.overrides]]
module = "jqcli.*"
ignore_errors = true

# PyYAML ships no inline type stubs and types-PyYAML is not in the dev deps;
# silence import-untyped for the SKILL.md frontmatter parser.
[[tool.mypy.overrides]]
module = "yaml.*"
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = [".", "packages"]
markers = [
    "unit: Unit tests (fast, mocked dependencies)",
    "integration: Integration tests (service flows, HTTP endpoints)",
]

[dependency-groups]
dev = [
    "black>=26.5.1",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=4.1",
    "ruff>=0.1",
    "mypy>=1.0",
]
