[project]
name = "backend"
version = "0.1.0"
description = "FastAPI project generated by cookiecutter-fastapi"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "backend contributors"},
]
dependencies = [
    "fastapi>=0.115.0",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "aiosqlite>=0.20",
    "pydantic[email]>=2.0",
    "pydantic-settings>=2.0",
    "uvicorn>=0.30",
    "alembic>=1.13",
    "httpx>=0.27",
    "loguru>=0.7",
    "orjson>=3.9",
    "python-jose[cryptography]>=3.3",
    "passlib[bcrypt]>=1.7",
    "bcrypt>=4.0.0,<5.0.0",
    "python-multipart>=0.0.9",
    "pytz>=2023.3",
    "opentelemetry-sdk>=1.20",
    "opentelemetry-api>=1.20",
    "email-validator>=2.0",
    "types-pytz>=2026.2.0.20260518",
    "types-passlib>=1.7.7.20260211",
    "types-python-jose>=3.5.0.20260408",
    "types-gunicorn>=26.0.0.20260518",
    "opentelemetry-instrumentation>=0.63b1",
    "opentelemetry-instrumentation-fastapi>=0.63b1",
    "opentelemetry-instrumentation-redis>=0.63b1",
    "opentelemetry-instrumentation-sqlalchemy>=0.63b1",
    "opentelemetry-exporter-otlp-proto-grpc>=1.20",
    "prometheus-fastapi-instrumentator>=7.1.0",
    "langgraph>=1.2.1",
    "langchain-core>=1.4.0",
    "langchain-openai>=1.2.2",
    "langgraph-checkpoint>=4.1.1",
    "langgraph-checkpoint-sqlite>=3.1.0",
    "debugpy>=1.8.20",
    "chromadb>=0.5.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "ruff>=0.1",
    "mypy>=1.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = [".", "packages"]
include = ["app*", "jqcli*"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
exclude = [
    "app/web/lifespan.py",
]
disable_error_code = [
    "union-attr",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = [".", "packages"]
markers = [
    "unit: Unit tests (fast, mocked dependencies)",
    "integration: Integration tests (service flows, HTTP endpoints)",
]

[dependency-groups]
dev = [
    "black>=26.5.1",
]

[project.scripts]
touch_latest_alembic_revision = "app.db.migrations.hook:touch_latest_revision"
