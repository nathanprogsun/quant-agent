line-length = 100
target-version = "py313"

[lint]
select = ["E", "W", "F", "I", "UP", "PIE", "RET", "SIM", "RUF", "PLC"]
ignore = ["E501", "ISC001", "RUF012", "RUF001", "RUF006"]

[lint.per-file-ignores]
"scripts/*.py" = ["E402", "PLC0415"]

[lint.isort]
known-first-party = []

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
