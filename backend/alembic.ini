[alembic]
script_location = app/db/migrations
prepend_sys_path = .
path_separator = os
file_template = %%(year)d-%%(month).2d-%%(day).2d-%%(hour).2d-%%(minute).2d-%%(second).2d_%%(rev)s
version_path_separator = os

[post_write_hooks]
hooks = black,touch_latest_alembic_revision
touch_latest_alembic_revision.type = console_scripts
touch_latest_alembic_revision.entrypoint = touch_latest_alembic_revision
touch_latest_alembic_revision.options = REVISION_SCRIPT_FILENAME
black.type = console_scripts
black.entrypoint = black
black.options = REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S